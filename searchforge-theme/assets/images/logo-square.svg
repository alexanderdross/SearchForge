<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#094842"/>
    </linearGradient>
    <!-- Subtle inner shadow for depth -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- === ANVIL (forge) — drawn natively at 512 scale === -->

  <!-- Anvil base / pedestal -->
  <rect x="140" y="340" width="232" height="52" rx="10" fill="#ffffff"/>

  <!-- Anvil face (wide flat top) -->
  <rect x="108" y="296" width="296" height="52" rx="12" fill="#ffffff"/>

  <!-- Anvil horn (working surface) -->
  <path d="M164 252 h160 a20 20 0 0 1 20 20 v24 H144 v-24 a20 20 0 0 1 20-20z" fill="#ffffff" opacity="0.92"/>

  <!-- Subtle anvil edge highlight -->
  <rect x="108" y="296" width="296" height="6" rx="3" fill="#ffffff" opacity="0.5"/>

  <!-- === MAGNIFYING GLASS (search) — larger, bolder, overlapping anvil === -->
  <g filter="url(#shadow)">
    <!-- Glass circle -->
    <circle cx="316" cy="168" r="72" stroke="#14b8a6" stroke-width="28" fill="rgba(20,184,166,0.08)"/>
    <!-- Inner highlight ring -->
    <circle cx="316" cy="168" r="52" stroke="#ffffff" stroke-width="3" fill="none" opacity="0.25"/>
    <!-- Handle -->
    <line x1="368" y1="220" x2="410" y2="266" stroke="#14b8a6" stroke-width="28" stroke-linecap="round"/>
  </g>

  <!-- === SPARKS (forge heat) — amber accents === -->
  <circle cx="204" cy="152" r="20" fill="#f59e0b"/>
  <circle cx="168" cy="192" r="13" fill="#f59e0b" opacity="0.7"/>
  <circle cx="224" cy="200" r="9" fill="#f59e0b" opacity="0.5"/>
</svg>
