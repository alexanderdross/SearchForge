<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#094842"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <clipPath id="lens-clip">
      <circle cx="232" cy="208" r="96"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- === MAGNIFYING GLASS — primary element === -->
  <g filter="url(#glow)">
    <!-- Glass lens background -->
    <circle cx="232" cy="208" r="96" fill="rgba(255,255,255,0.1)"/>

    <!-- Data bars inside the lens (SEO data being "forged") -->
    <g clip-path="url(#lens-clip)">
      <rect x="172" y="244" width="24" height="60" rx="4" fill="#14b8a6" opacity="0.8"/>
      <rect x="204" y="212" width="24" height="92" rx="4" fill="#14b8a6" opacity="0.9"/>
      <rect x="236" y="228" width="24" height="76" rx="4" fill="#14b8a6"/>
      <rect x="268" y="192" width="24" height="112" rx="4" fill="#f59e0b"/>
    </g>

    <!-- Glass ring -->
    <circle cx="232" cy="208" r="96" stroke="#ffffff" stroke-width="20" fill="none"/>

    <!-- Glass highlight arc -->
    <path d="M 172 148 A 80 80 0 0 1 280 140" stroke="#ffffff" stroke-width="4" fill="none" opacity="0.35" stroke-linecap="round"/>

    <!-- Handle -->
    <line x1="304" y1="282" x2="380" y2="362" stroke="#ffffff" stroke-width="28" stroke-linecap="round"/>
    <line x1="304" y1="282" x2="380" y2="362" stroke="rgba(255,255,255,0.5)" stroke-width="34" stroke-linecap="round"/>
  </g>

  <!-- === FORGE SPARKS — rising from the data === -->
  <circle cx="188" cy="118" r="10" fill="#f59e0b"/>
  <circle cx="216" cy="98" r="14" fill="#f59e0b" opacity="0.9"/>
  <circle cx="252" cy="108" r="8" fill="#f59e0b" opacity="0.6"/>
  <circle cx="168" cy="138" r="6" fill="#f59e0b" opacity="0.45"/>

  <!-- === HAMMER — small forge accent, top-right === -->
  <g transform="translate(360, 88) rotate(30)" filter="url(#glow)">
    <!-- Hammer head -->
    <rect x="-28" y="-14" width="56" height="28" rx="6" fill="#ffffff"/>
    <!-- Hammer handle -->
    <rect x="-4" y="14" width="8" height="52" rx="4" fill="#ffffff" opacity="0.85"/>
  </g>
</svg>
