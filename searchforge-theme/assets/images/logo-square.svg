<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#094842"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- === ANVIL — proper side-profile silhouette === -->
  <g filter="url(#shadow)">
    <!-- Anvil body: classic shape with horn on left, heel on right -->
    <path d="
      M 110 300
      L 110 280
      Q 110 268 122 268
      L 160 268
      L 160 248
      Q 160 236 172 236
      L 340 236
      Q 352 236 352 248
      L 352 268
      L 390 268
      Q 402 268 402 280
      L 402 300
      Z
    " fill="#ffffff"/>

    <!-- Anvil horn (pointed left extension) -->
    <path d="
      M 110 280
      L 72 272
      Q 60 270 60 278
      L 60 284
      Q 60 292 72 290
      L 110 284
      Z
    " fill="#ffffff" opacity="0.92"/>

    <!-- Anvil base / pedestal -->
    <path d="
      M 152 300
      L 152 320
      Q 152 340 172 340
      L 188 340
      L 188 370
      Q 188 384 202 384
      L 310 384
      Q 324 384 324 370
      L 324 340
      L 340 340
      Q 360 340 360 320
      L 360 300
      Z
    " fill="#ffffff" opacity="0.88"/>

    <!-- Anvil face highlight -->
    <rect x="160" y="236" width="192" height="6" rx="3" fill="#ffffff" opacity="0.4"/>
  </g>

  <!-- === MAGNIFYING GLASS (search) — overlapping top-right === -->
  <g filter="url(#shadow)">
    <circle cx="320" cy="148" r="64" stroke="#14b8a6" stroke-width="24" fill="rgba(20,184,166,0.1)"/>
    <circle cx="320" cy="148" r="44" stroke="#ffffff" stroke-width="2.5" fill="none" opacity="0.2"/>
    <line x1="366" y1="196" x2="404" y2="237" stroke="#14b8a6" stroke-width="24" stroke-linecap="round"/>
  </g>

  <!-- === SPARKS (forge heat) — amber accents === -->
  <circle cx="196" cy="140" r="18" fill="#f59e0b"/>
  <circle cx="164" cy="176" r="12" fill="#f59e0b" opacity="0.75"/>
  <circle cx="220" cy="184" r="8" fill="#f59e0b" opacity="0.5"/>
</svg>
